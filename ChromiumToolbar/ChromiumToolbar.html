<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chromium Toolbar Matrix Configuration</title>
  <script type="module" src="cr-toolbar.js"></script>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 0;
      margin: 0;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .demo-wrapper {
      padding: 20px;
    }

    /* Icon shape setups for custom slotted tools, Jake */
    .icon-glyph {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* --- Theme Token Layer Sets, Jake --- */
    .theme-text {
      --cr-toolbar-bg: #ffffff;
      --cr-toolbar-color: #1d1b20;
      --cr-toolbar-search-bg: #f0f0f3;
      --cr-toolbar-search-focus-border: #6750a4;
    }

    .theme-tonal {
      --cr-toolbar-bg: #e8def8; /* Tonal Container Fill */
      --cr-toolbar-color: #1d192b;
      --cr-toolbar-search-bg: #f3ecf7;
      --cr-toolbar-search-focus-bg: #ffffff;
      --cr-toolbar-search-focus-border: #1d192b;
    }

    .theme-error {
      --cr-toolbar-bg: #b3261e; /* Tertiary Critical Warning Crimson */
      --cr-toolbar-color: #ffffff;
      --cr-toolbar-search-bg: rgba(255, 255, 255, 0.2);
      --cr-toolbar-search-focus-bg: #ffffff;
      --cr-toolbar-search-focus-border: #f9dedc;
    }
    .theme-error ::slotted(button:hover) {
      background-color: rgba(255, 255, 255, 0.15) !important;
    }
  </style>
</head>
<body>

  <!-- 1. TEXT VARIANT -->
  <cr-toolbar class="theme-text" clear-on-escape search-placeholder="Search configurations, Jake...">
    <button slot="menu-button">
      <svg class="icon-glyph" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
    <span slot="title">Workspace Panel (Jake)</span>
    <div slot="actions">
      <button title="Notifications">
        <svg class="icon-glyph" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      </button>
    </div>
  </cr-toolbar>

  <!-- 2. TONAL VARIANT -->
  <cr-toolbar class="theme-tonal" search-placeholder="Filter tonal workspace databases...">
    <span slot="title">Database Analytics (Jake)</span>
    <div slot="actions">
      <button title="Refresh Array">
        <svg class="icon-glyph" viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
    </div>
  </cr-toolbar>

  <!-- 3. TERTIARY / ERROR DANGER VARIANT -->
  <cr-toolbar class="theme-error" clear-on-escape search-placeholder="Search security threshold logs...">
    <span slot="title">CRITICAL OVERRIDE (Jake)</span>
  </cr-toolbar>

  <div class="demo-wrapper">
    <p style="font-size: 13px; color: #555;">Type in the search boxes to test input tracking pipelines, Jake. Check the console log to inspect output hooks.</p>
  </div>

  <script>
    // Capture search queries from your headers instantly, Jake
    document.addEventListener('cr-toolbar-search', (e) => {
      console.log('Jake, current toolbar filtering pattern set to:', e.detail.query);
    });
  </script>

</body>
</html>
