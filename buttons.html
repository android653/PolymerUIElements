<!-- 1. Flat Variant (Default) -->
<button class="paper-btn">Flat Button</button>

<!-- 2. Raised Variant (Adds a box-shadow lift) -->
<button class="paper-btn raised">Raised Button</button>

<!-- 3. Toggle-able Variant (Stays active/pressed after click) -->
<button class="paper-btn toggle" aria-pressed="false">Toggle Button</button>

<!-- 4. Disabled Variant (Faded and unclickable) -->
<button class="paper-btn" disabled>Disabled Button</button>
